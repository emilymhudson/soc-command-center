name: Security Posture Audit
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grants the Action permission to push code
    steps:
      - uses: actions/checkout@v4 # Updated to fix the Node 20 warning
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to fix the Node 20 warning
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install PyGithub
        
      - name: Run Orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python orchestrator.py
        
      - name: Commit Dashboard
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Security_Posture_Report.md
          
          # The '|| true' tells the pipeline: "If there are no new changes, don't crash!"
          git commit -m "Automated SOC Dashboard Update" || true
          git push
